<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zyra</title>
    <style>
      /* Yeh hai hamari animation ka code */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100%;
        height: 100vh;
        margin: 0;
        font-family: sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a212e, #0a121d);
        color: #fff; /* Text ka color white kar rahe hain taake woh dikhe */
        scrollbar-width: thin; /* Firefox ke liye */
        scrollbar-color: #6820eec5 #1a1a1a;
      }

      .loader {
        width: 100%;
        height: 100vh;
        position: absolute;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #1a212ea8;
        backdrop-filter: blur(5px); /* Yeh line naye hai */
        -webkit-backdrop-filter: blur(5px); /* Safari ke liye */
        z-index: 50;
      }
      .loader img {
        width: 120px;
        /* translate ko yahan se hata denge */
        animation: pulse 0.5s infinite alternate;
        z-index: 51;
      }
      @keyframes pulse {
        from {
          transform: scale(0.95); /* Thoda chhota ho kar shuru karega */
        }
        to {
          transform: scale(1.1); /* Thoda bada ho kar khatam hoga */
        }
      }

      /* Chrome, Safari, aur Edge ke liye */
      ::-webkit-scrollbar {
        width: 10px; /* Scrollbar ki width */
      }

      /* Scrollbar ka track */
      ::-webkit-scrollbar-track {
        background: #1a1a1a; /* Dark background color */
      }

      /* Scrollbar ka thumb */
      ::-webkit-scrollbar-thumb {
        background-color: #00d2ff; /* Aapki pasand ka color */
        border-radius: 6px;
        border: 2px solid #1a1a1a;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader">
        <img src="/logo.png" alt="Zyra Logo" />
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
